version: '3.8'

services:
  face-service:
    build: .
    container_name: face-screening-service
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_ENABLED=false
      - PORT=8000
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    shm_size: '2gb'  # Important for DeepFace/TensorFlow
